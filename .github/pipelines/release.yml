name: Release Pipeline
on: [workflow_dispatch]

steps:
  - name: Checkout
    uses: actions/checkout@v6

  - name: Install Rust
    uses: dtolnay/rust-toolchain@stable
    with:
      toolchain: stable
      targets: x86_64-apple-darwin,aarch64-apple-darwin

  - name: Cache
    uses: Swatinem/rust-cache@v2

  - name: Build (x86_64)
    run: cargo build --release --target x86_64-apple-darwin -p agent-eyes

  - name: Build (aarch64)
    run: cargo build --release --target aarch64-apple-darwin -p agent-eyes

  - name: Package
    run: |
      mkdir -p dist
      cp target/x86_64-apple-darwin/release/agent-eyes dist/agent-eyes-x86_64-apple-darwin
      cp target/aarch64-apple-darwin/release/agent-eyes dist/agent-eyes-aarch64-apple-darwin

  - name: Create Release
    uses: softprops/action-gh-release@v2
    with:
      files: dist/*
      body_path: CHANGELOG.md
